<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SantechPrekyba Kontaktai</title>

    <!-- Bootstrap karkasas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Pagrindinis stilių failas -->
    <link rel="stylesheet" href="css/style.css">
    <!-- CSS kintamieji (spalvos, šriftai, tarpai) -->
    <link rel="stylesheet" href="css/variables.css">
</head>
<body>

    <!-- Navigacija - flex išdėstymas, sticky viršuje -->
    <nav>
        <img src="img/Logo.png" alt="Logotipas" class="logo-black">
        <!-- Navigacijos nuorodos -->
        <div class="navbar-links">
            <a href="index.html">Pagrindinis</a>
            <a href="product.html">Produkcija</a>
            <a href="contact.html">Kontaktai</a>
            <a href="services.html">Paslaugos</a>
            <a href="gallery.html">Galerija</a>
        </div>
    </nav>

    <!-- Pagrindinis turinys -->
    <main>

        <!-- Kontaktų forma -->
        <section class="formInfo">
            <h2>Susisiekimas</h2>
            <!-- Forma su JS validacija -->
            <form onsubmit="return validateForm()">

                <!-- Vardo laukelis -->
                <label for="name">Vardas:</label>
                <input type="text" id="name" name="name" required>

                <!-- El. pašto laukelis -->
                <label for="email">El. paštas:</label>
                <input type="email" id="email" name="email" required>

                <!-- Žinutės laukelis -->
                <label for="message">Žinutė:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <!-- Pateikimo mygtukas -->
                <button type="submit">Siųsti</button>
            </form>
        </section>

        <!-- Kontaktų informacija -->
        <section class="contactInfo">
            <!-- Flex konteineris - nuotrauka šalia teksto -->
            <div class="contact-container">
                <div class="contact-details">
                    <h2>Kontaktai</h2>
                    <p>Vardas, pavardė: Lorem ipsum</p>
                    <p>Telefonas: +370 600 12345</p>
                    <p>Email: Loremipsum@santechnika.lt</p>
                </div>
                <!-- Darbuotojo nuotrauka -->
                <img src="img/human.jpg" alt="Darbuotojas" class="contact-image">
            </div>
        </section>

    </main>

    <!-- Footer - puslapio apačia -->
    <footer>
        <p>&copy; 2024 Santechnika. All rights reserved.</p>
    </footer>

    <!-- JavaScript failas -->
    <script src="js/script.js"></script>
</body>
</html>
